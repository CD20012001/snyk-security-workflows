name: Snyk Filter

on:
  workflow_call:
    inputs:
      install-command:
        description: "Command to install dependencies"
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  snyk-filter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Run Snyk scan and save JSON
        run: snyk test --json > snyk.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Filter and fail on critical/high with mature or POC exploit
        run: |
          python3 << 'EOF'
          import json, sys

          with open('snyk.json') as f:
              data = json.load(f)

          projects = data if isinstance(data, list) else [data]

          failed = []

          for project in projects:
              for vuln in project.get('vulnerabilities', []):

                  severity = vuln.get('severity', '').lower()

                  exploit_raw = vuln.get('exploit', '') or ''
                  exploit_normalised = exploit_raw.lower().replace(' ', '-')

                  is_high_or_critical = severity in ['high', 'critical']
                  is_exploitable = exploit_normalised in ['mature', 'proof-of-concept']

                  if is_high_or_critical and is_exploitable:
                      failed.append({
                          'id'      : vuln.get('id'),
                          'severity': severity,
                          'exploit' : exploit_raw,
                          'title'   : vuln.get('title'),
                          'package' : vuln.get('name'),
                          'version' : vuln.get('version'),
                          'fixedIn' : vuln.get('fixedIn')
                      })

          if failed:
              print(f"\nBUILD FAILED: {len(failed)} vulnerabilities found!\n")
              for v in failed:
                  print(f"  ID       : {v['id']}")
                  print(f"  Title    : {v['title']}")
                  print(f"  Package  : {v['package']} @ {v['version']}")
