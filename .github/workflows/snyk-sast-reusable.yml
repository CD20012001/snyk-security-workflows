# .github/workflows/snyk-sast-reusable.yml
# ─────────────────────────────────────────────────────────────────────────────
# Universal Snyk SAST reusable workflow
# Works for ANY language – Node.js, Python, Java, Go, Ruby, .NET, PHP, etc.
# No language input needed – Snyk auto-detects everything via --all-projects
#
# Inputs (all optional):
#   severity-filter : 'critical' | 'high' | 'critical,high'  (default: critical,high)
#   fail-on-exploit : only fail when POC or mature exploit exists (default: true)
# ─────────────────────────────────────────────────────────────────────────────

name: Snyk SAST – Reusable (Universal)

on:
  workflow_call:
    inputs:
      severity-filter:
        description: "Comma-separated severities that can fail the build"
        required: false
        type: string
        default: "critical,high"

      fail-on-exploit:
        description: "Only fail when a public exploit (poc or mature) is available"
        required: false
        type: boolean
        default: true

    secrets:
      SNYK_TOKEN:
        description: "Snyk API token"
        required: true

    outputs:
      vulnerabilities-found:
        description: "true if matching vulnerabilities were found"
        value: ${{ jobs.snyk-sast.outputs.vulnerabilities-found }}

jobs:
  snyk-sast:
    name: Snyk SAST Scan
    runs-on: ubuntu-latest

    outputs:
      vulnerabilities-found: ${{ steps.snyk-filter.outputs.vulnerabilities-found }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Auto-detect language and install dependencies ─────────────────────
      #       Snyk needs dependencies installed to build the dependency tree.
      #       We detect the manifest file and run the right install command.
      - name: Install dependencies (auto-detect language)
        run: |
          echo "🔍 Detecting project language..."

          # ── Node.js ──────────────────────────────────────────────────────────
          if [ -f package.json ]; then
            echo "✅ Detected: Node.js"
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs
            if   [ -f package-lock.json ]; then npm ci
            elif [ -f yarn.lock ];         then yarn install --frozen-lockfile
            elif [ -f pnpm-lock.yaml ];    then npx pnpm install --frozen-lockfile
            else                                npm install
            fi

          # ── Python ───────────────────────────────────────────────────────────
          elif [ -f requirements.txt ] || [ -f Pipfile ] || [ -f pyproject.toml ]; then
            echo "✅ Detected: Python"
            sudo apt-get install -y python3-pip python3-dev python3-setuptools
            python3 -m pip install --upgrade pip setuptools wheel
            if [ -f requirements.txt ]; then
              # --prefer-binary avoids building from source (fixes old packages on Python 3.12)
              python3 -m pip install -r requirements.txt --prefer-binary ||               python3 -m pip install -r requirements.txt --prefer-binary --ignore-requires-python || true
              echo "--- Installed packages ---"
              python3 -m pip list
            elif [ -f Pipfile ]; then
              python3 -m pip install pipenv
              pipenv install --system --deploy
            elif [ -f pyproject.toml ]; then
              python3 -m pip install . --prefer-binary || true
            fi

          # ── Java (Maven) ─────────────────────────────────────────────────────
          elif [ -f pom.xml ]; then
            echo "✅ Detected: Java (Maven)"
            sudo apt-get install -y default-jdk
            mvn -q install -DskipTests

          # ── Java (Gradle) ────────────────────────────────────────────────────
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            echo "✅ Detected: Java (Gradle)"
            sudo apt-get install -y default-jdk
            ./gradlew build -x test

          # ── Go ───────────────────────────────────────────────────────────────
          elif [ -f go.mod ]; then
            echo "✅ Detected: Go"
            sudo apt-get install -y golang
            go mod download

          # ── Ruby ─────────────────────────────────────────────────────────────
          elif [ -f Gemfile ]; then
            echo "✅ Detected: Ruby"
            sudo apt-get install -y ruby-bundler
            bundle install

          # ── .NET ─────────────────────────────────────────────────────────────
          elif ls *.csproj *.sln 2>/dev/null | head -1 | grep -q .; then
            echo "✅ Detected: .NET"
            sudo apt-get install -y dotnet-sdk-8.0
            dotnet restore

          # ── PHP ──────────────────────────────────────────────────────────────
          elif [ -f composer.json ]; then
            echo "✅ Detected: PHP"
            sudo apt-get install -y php composer
            composer install --no-interaction

          else
            echo "⚠️  No known manifest file found – Snyk will still attempt scan"
          fi
        continue-on-error: true   # don't fail if install has warnings

      # ── 3. Install Snyk CLI ──────────────────────────────────────────────────
      - name: Install Snyk CLI
        run: npm install -g snyk@latest

      # ── 4. Run Snyk scan – full JSON output for custom filtering ─────────────
      - name: Run Snyk SAST scan (JSON output)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --all-projects \
            --detection-depth=6 \
            --json-file-output=snyk-results.json \
            --severity-threshold=low \
            --command=python3 \
            --skip-unresolved \
          || true   # always continue – filtering is done in the next step

      # ── 5. Custom filter: severity + exploit maturity ────────────────────────
      - name: Apply Snyk filter (severity + exploit maturity)
        id: snyk-filter
        env:
          SEVERITY_FILTER: ${{ inputs.severity-filter }}
          FAIL_ON_EXPLOIT: ${{ inputs.fail-on-exploit }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          results_file    = "snyk-results.json"
          severity_filter = [s.strip().lower() for s in os.environ["SEVERITY_FILTER"].split(",")]
          fail_on_exploit = os.environ["FAIL_ON_EXPLOIT"].lower() == "true"

          # Exploit maturities that count as "public exploit available"
          # Covers all Snyk JSON formats: Node.js, Java/Maven, Python, Go etc.
          PUBLIC_EXPLOIT_MATURITIES = {"proof-of-concept", "poc", "mature", "functional"}

          def fetch_maturity_from_api(vuln_id, snyk_token):
              """
              Snyk CLI JSON does not include exploit maturity for Python packages.
              We fetch it from the Snyk REST API using the vulnerability ID.
              """
              import urllib.request, urllib.error
              try:
                  url = f"https://api.snyk.io/rest/vulnerabilities/{vuln_id}?version=2023-11-27"
                  req = urllib.request.Request(url, headers={
                      "Authorization": f"token {snyk_token}",
                      "Content-Type": "application/json"
                  })
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      data = json.loads(resp.read())
                  # Extract maturity from REST API response
                  attrs = data.get("data", {}).get("attributes", {})
                  slots = attrs.get("slots", {})
                  maturity = (
                      slots.get("exploit")
                      or attrs.get("exploit")
                      or "no-known-exploit"
                  )
                  return str(maturity).strip().lower().replace(" ", "-")
              except Exception:
                  return "no-known-exploit"

          # Cache API results to avoid duplicate calls
          _api_cache = {}

          def extract_maturity(v, snyk_token=None):
              """
              Snyk stores exploit maturity in different places per ecosystem:
              Node.js   -> top-level "exploit" e.g. "Proof of Concept", "Mature"
              Java/Maven -> top-level "exploit" with CVSS score e.g. "High"
              Python    -> NOT in CLI JSON at all — must call Snyk REST API
              """
              # ── Step 1: Check exploitDetails.maturityLevels ──────────────────────
              exploit_details = v.get("exploitDetails") or {}
              if isinstance(exploit_details, dict):
                  maturity_levels = exploit_details.get("maturityLevels") or []
                  if isinstance(maturity_levels, list) and maturity_levels:
                      primary = next(
                          (m for m in maturity_levels if str(m.get("type","")).lower() == "primary"),
                          maturity_levels[0]
                      )
                      level = str(primary.get("level") or "").strip()
                      if level and level.lower() not in ("", "not defined", "not-defined"):
                          return level.lower().replace(" ", "-")

              # ── Step 2: Check top-level exploitMaturity ──────────────────────────
              exploit_maturity = v.get("exploitMaturity") or ""
              if exploit_maturity:
                  return str(exploit_maturity).strip().lower().replace(" ", "-")

              # ── Step 3: Map top-level "exploit" field ────────────────────────────
              exploit_raw = str(v.get("exploit") or "not-defined").strip().lower()
              exploit_normalised = exploit_raw.replace(" ", "-")

              CVSS_TO_MATURITY = {
                  "proof-of-concept"  : "proof-of-concept",
                  "poc"               : "proof-of-concept",
                  "mature"            : "mature",
                  "functional"        : "functional",
                  "no-known-exploit"  : "no-known-exploit",
                  "high"              : "mature",
                  "unproven"          : "no-known-exploit",
                  "not-defined"       : "no-known-exploit",
              }
              mapped = CVSS_TO_MATURITY.get(exploit_normalised, exploit_normalised)

              # ── Step 4: If still unresolved, call Snyk REST API ──────────────────
              # Python CLI JSON never has maturity — API is the only source of truth
              if mapped in ("no-known-exploit", "not-defined") and snyk_token:
                  vuln_id = v.get("id", "")
                  if vuln_id and vuln_id not in _api_cache:
                      _api_cache[vuln_id] = fetch_maturity_from_api(vuln_id, snyk_token)
                  return _api_cache.get(vuln_id, mapped)

              return mapped

          try:
              with open(results_file) as f:
                  raw = json.load(f)
          except FileNotFoundError:
              print("::warning::snyk-results.json not found – treating as no issues.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("vulnerabilities-found=false\n")
              sys.exit(0)

          # Snyk JSON can be a single object or a list (--all-projects)
          projects  = raw if isinstance(raw, list) else [raw]
          matched   = []
          all_vulns = []

          for project in projects:
              for v in project.get("vulnerabilities", []):
                  severity = v.get("severity", "").lower()
                  snyk_token = os.environ.get("SNYK_TOKEN", "")
                  maturity = extract_maturity(v, snyk_token=snyk_token)

                  all_vulns.append({
                      "id":       v.get("id"),
                      "title":    v.get("title"),
                      "severity": severity,
                      "exploit":  maturity,
                      "package":  v.get("packageName"),
                      "version":  v.get("version"),
                      "from":     v.get("from", []),
                  })

                  severity_match = severity in severity_filter
                  exploit_match  = (not fail_on_exploit) or (maturity in PUBLIC_EXPLOIT_MATURITIES)

                  if severity_match and exploit_match:
                      matched.append(all_vulns[-1])

          # ── Print summary ─────────────────────────────────────────────────────
          print(f"\n{'='*70}")
          print(f"  Snyk Filter Summary")
          print(f"{'='*70}")
          print(f"  Total vulnerabilities scanned  : {len(all_vulns)}")
          print(f"  Severity filter                : {severity_filter}")
          print(f"  Exploit maturity required      : {fail_on_exploit}")
          print(f"  Matched (build-breaking) vulns : {len(matched)}")
          print(f"{'='*70}\n")

          if matched:
              print("::error::Build failed – vulnerabilities meeting filter criteria:\n")
              for v in matched:
                  print(f"  [{v['severity'].upper()}] {v['id']} – {v['title']}")
                  print(f"    Package : {v['package']} @ {v['version']}")
                  print(f"    Exploit : {v['exploit']}")
                  print(f"    Path    : {' > '.join(v['from'])}")
                  print()

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"vulnerabilities-found={'true' if matched else 'false'}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as s:
              s.write("## Snyk SAST Results\n\n")
              s.write("| Metric | Value |\n|---|---|\n")
              s.write(f"| Total vulnerabilities | {len(all_vulns)} |\n")
              s.write(f"| Build-breaking matches | {len(matched)} |\n")
              s.write(f"| Severity filter | `{', '.join(severity_filter)}` |\n")
              s.write(f"| Exploit filter active | `{fail_on_exploit}` |\n\n")
              if matched:
                  s.write("### ❌ Blocking Vulnerabilities\n\n")
                  s.write("| Severity | ID | Title | Package | Exploit |\n|---|---|---|---|---|\n")
                  for v in matched:
                      s.write(f"| {v['severity'].upper()} | {v['id']} | {v['title']} | {v['package']}@{v['version']} | {v['exploit']} |\n")
              else:
                  s.write("### ✅ No blocking vulnerabilities found\n")

          sys.exit(1 if matched else 0)
          PYEOF

      # ── 6. Upload raw results as artifact (always, for audit trail) ──────────
      - name: Upload Snyk results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sast-results-${{ github.run_id }}
          path: snyk-results.json
          retention-days: 30
