name: Reusable Snyk SCA Scan

on:
  workflow_call:
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Snyk
        run: npm install -g snyk

      - name: Install Snyk Filter
        run: npm install -g snyk-filter

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Create Filter
        run: |
          mkdir -p .snyk-filter

          cat > .snyk-filter/filter-poc.yml << 'EOF'
          version: 2

          customFilters:
            filter: >
              .vulnerabilities |= map(
                if (
                  (.severity == "high" or .severity == "critical")
                  and
                  (
                    .exploit == "Proof of Concept"
                    or
                    .exploit == "Mature"
                  )
                )
                then .
                else empty
                end
              )

            pass: >
              [.vulnerabilities[]
                | select(
                    (.severity == "high" or .severity == "critical")
                    and
                    (
                      .exploit == "Proof of Concept"
                      or
                      .exploit == "Mature"
                    )
                  )
              ] | length

            msg: "High/Critical vulnerability with Mature or PoC exploit detected"
          EOF

      - name: Run Snyk Scan
        run: |
          snyk test --all-projects --json > opensource-results.json || true

      - name: Show Maturity Levels
        run: |
         cat opensource-results.json | jq '
         .vulnerabilities[] |
         {
           title,
           severity,
           exploit,
           maturity: (.exploitDetails.maturityLevels // [])
         }'
         
      - name: Dump Full First Vulnerability
        run: |
         cat opensource-results.json | jq '.vulnerabilities[0]'
         
      - name: Apply Filter
        run: |
          snyk-filter \
            -i opensource-results.json \
            -f .snyk-filter/filter-poc.yml
