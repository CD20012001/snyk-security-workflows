name: Snyk Filter Reusable

on:
  workflow_call:
    inputs:
      install-command:
        description: "Command to install dependencies (needed for Maven/pip and lockfile-less npm/yarn). Leave empty if a lockfile is committed."
        required: false
        type: string
        default: ""
      severity-filter:
        description: "Comma-separated severities that break the build, e.g. 'critical,high'"
        required: false
        type: string
        default: "critical,high"
      fail-on-exploit:
        description: "If true, only fail on issues that also have a real exploit (PoC/Functional/High/Attacked). If false, fail on any issue at the chosen severities."
        required: false
        type: boolean
        default: true
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        if: ${{ inputs.install-command != '' }}
        run: ${{ inputs.install-command }}

      - name: Warn if no install-command
        if: ${{ inputs.install-command == '' }}
        run: |
          echo "::warning::No install-command provided. Maven, pip, and lockfile-less npm/yarn projects may under-report dependencies."

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Scan
        run: snyk test --json > opensource-results.json || true

      - name: Upload Snyk Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: opensource-results.json

      - name: Apply Filter
        run: |
          SEVERITIES="${{ inputs.severity-filter }}"
          FAIL_ON_EXPLOIT="${{ inputs.fail-on-exploit }}"
          echo "Filtering on severities: [$SEVERITIES] | fail-on-exploit: $FAIL_ON_EXPLOIT"

          FILTERED=$(cat opensource-results.json | jq -c \
            --arg sevs "$SEVERITIES" \
            --argjson failOnExploit "$FAIL_ON_EXPLOIT" '
            def exnorm: (. // "")
              | ascii_downcase
              | gsub("[-_]"; " ")
              | gsub("  +"; " ")
              | gsub("^ +| +$"; "");
            ($sevs | ascii_downcase | split(",") | map(gsub("^ +| +$"; ""))) as $sevset
            | [.vulnerabilities[]
                | select(
                    (.type != "license")
                    and ( ((.severity // "") | ascii_downcase) as $s | ($sevset | index($s)) != null )
                    and ( if $failOnExploit
                            then ( ((.exploit // "") | exnorm) as $e
                                   | ($e == "high" or $e == "attacked"
                                      or $e == "functional" or $e == "proof of concept") )
                            else true end )
                  )]
          ')

          COUNT=$(echo "$FILTERED" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "No matching vulnerabilities found. Build passed."
            exit 0
          fi

          echo "Build failed - vulnerabilities meeting filter criteria:"
          echo "================================================================"
          echo ""
          echo "$FILTERED" | jq -r '.[] |
            "[\(.severity | ascii_upcase)] \(.identifiers.CVE[0] // .id) - \(.title)",
            "    Package : \(.packageName) @ \(.version)",
            "    Exploit : \(.exploit // "Not Defined")",
            "    Path    : \(.from | join(" > "))",
            ""
          '
          echo "================================================================"
          echo "Build-breaking vulns : $COUNT"
          echo "================================================================"
          echo ""
          echo "Error: Build failed - vulnerabilities meeting filter criteria:"
          exit 1
