name: Snyk Filter Reusable

on:
  workflow_call:
    inputs:
      install-command:
        description: "Command to install dependencies"
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: ${{ inputs.install-command }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Install Snyk Filter
        run: npm install -g snyk-filter

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Scan
        run: snyk test --json > opensource-results.json || true

      - name: Show Exploit Values
        run: |
          cat opensource-results.json | jq '.vulnerabilities[] | {
            title,
            severity,
            exploit
          }'

      - name: Apply Filter
        run: |
          cat > /tmp/high-poc.yml << 'FILTER'
          version: 2
          customFilters:
            filter: >
              .vulnerabilities |= map(
                if (
                  (.severity == "high" or .severity == "critical")
                  and
                  (
                    .exploit == "Proof of Concept"
                    or
                    .exploit == "Mature"
                  )
                )
                then .
                else empty
                end
              )
          pass: >
            [.vulnerabilities[]
              | select(
                  (.severity == "high" or .severity == "critical")
                  and
                  (
                    .exploit == "Proof of Concept"
                    or
                    .exploit == "Mature"
                  )
                )
            ] | length
          msg: "High/Critical vulnerability with Mature or PoC exploit detected"
          FILTER
          snyk-filter -i opensource-results.json -f /tmp/high-poc.yml
