name: Snyk Filter Reusable
on:
  workflow_call:
    inputs:
      install-command:
        description: "Command to install dependencies"
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: ${{ inputs.install-command }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Scan
        run: snyk test --json > opensource-results.json || true

      - name: Show Exploit Values
        run: |
         cat opensource-results.json | jq -r '
          [.vulnerabilities[] | select(
           (.severity == "high" or .severity == "critical") and
           (.exploit == "Proof of Concept" or .exploit == "Mature")
          )]
          | unique_by(.id)
          | .[] | "[\(.severity | ascii_upcase)] \(.title) — exploit: \(.exploit)"
         '

      - name: Apply Filter
        run: |
          cat opensource-results.json | jq -r '
            [.vulnerabilities[] | select(
              (.severity == "high" or .severity == "critical") and
              (.exploit == "Proof of Concept" or .exploit == "Mature")
            )]
            | unique_by(.id)
            | . as $vulns
            | "Found \(length) high/critical exploitable vulnerabilities:\n",
              (.[] | "  [\(.severity | ascii_upcase)] \(.title) — exploit: \(.exploit)")
          '

          VULN_COUNT=$(cat opensource-results.json | jq '
            [.vulnerabilities[] | select(
              (.severity == "high" or .severity == "critical") and
              (.exploit == "Proof of Concept" or .exploit == "Mature")
            )] | unique_by(.id) | length
          ')

          if [ "$VULN_COUNT" -gt 0 ]; then
            echo ""
            echo "Build failed: $VULN_COUNT unique high/critical exploitable vulnerabilities found"
            exit 1
          fi
