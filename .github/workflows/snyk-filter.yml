name: Snyk Filter Reusable

on:
  workflow_call:
    inputs:
      install-command:
        description: "Command to install dependencies"
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: ${{ inputs.install-command }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Install Snyk Filter
        run: npm install -g snyk-filter

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Scan
        run: snyk test --json > opensource-results.json || true

      - name: Show Exploit Values
        run: |
          cat opensource-results.json | jq '.vulnerabilities[] | {
            title,
            severity,
            exploit
          }'

      - name: Apply Filter
        run: |
         cat > /tmp/high-poc.yml << 'FILTER'
         version: 1
         filter:
          - severity:
            - high
            - critical
         exploit:
          - Mature
          - Proof of Concept
           FILTER
           snyk-filter -i opensource-results.json -f /tmp/high-poc.yml
