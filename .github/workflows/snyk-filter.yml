name: Snyk Filter Reusable
on:
  workflow_call:
    inputs:
      install-command:
        description: "Command to install dependencies"
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: ${{ inputs.install-command }}

      - name: Install Snyk and snyk-filter
        run: npm install -g snyk snyk-filter

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk with Filter
        run: |
          snyk test --json | snyk-filter -f .snyk-filter.yml || EXIT_CODE=$?
          
          if [ "${EXIT_CODE:-0}" -eq 0 ]; then
            echo "No high/critical exploitable vulnerabilities found. Build passed."
            exit 0
          else
            echo "Build failed due to vulnerabilities matching filter criteria."
            exit 1
          fi
