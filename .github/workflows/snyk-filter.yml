name: Snyk Filter Reusable

on:
  workflow_call:
    inputs:
      install-command:
        description: "Command to install dependencies"
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: ${{ inputs.install-command }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Scan
        run: snyk test --json > opensource-results.json || true

      - name: Upload Snyk Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: opensource-results.json

      - name: Debug Exploit Field
        run: |
          cat opensource-results.json | jq '.vulnerabilities[0]'

      - name: Apply Filter
        run: |
          # exnorm folds every exploit-maturity spelling into one canonical token so the
          # same rule works across languages. The field uses different vocabularies per
          # ecosystem: Snyk (Mature / Proof of Concept / No Known Exploit / No Data),
          # CVSS v3 (High / Functional / Proof of Concept / Unproven / Not Defined),
          # CVSS v4 (Attacked / ...). Build-breaking set = anything PoC-level or worse.
          FILTERED=$(cat opensource-results.json | jq -c '
            def exnorm: (. // "")
              | ascii_downcase
              | gsub("[-_]"; " ")
              | gsub("  +"; " ")
              | gsub("^ +| +$"; "");
            [.vulnerabilities[]
              | select(
                  (.type != "license")
                  and (((.severity // "") | ascii_downcase) | (. == "high" or . == "critical"))
                  and ( ((.exploit // .exploitMaturity) | exnorm) as $e
                        | ($e == "mature" or $e == "high" or $e == "attacked"
                           or $e == "functional" or $e == "proof of concept") )
                )]
          ')

          COUNT=$(echo "$FILTERED" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "No high/critical exploitable vulnerabilities found. Build passed."
            exit 0
          fi

          echo "Build failed - vulnerabilities meeting filter criteria:"
          echo "================================================================"
          echo ""
          echo "$FILTERED" | jq -r '.[] |
            "[\(.severity | ascii_upcase)] \(.identifiers.CVE[0] // .id) - \(.title)",
            "    Package : \(.packageName) @ \(.version)",
            "    Exploit : \(.exploit // .exploitMaturity)",
            "    Path    : \(.from | join(" > "))",
            ""
          '
          echo "================================================================"
          echo "Build-breaking vulns : $COUNT"
          echo "================================================================"
          echo ""
          echo "Error: Build failed - vulnerabilities meeting filter criteria:"
          exit 1
