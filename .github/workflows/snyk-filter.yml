name: Snyk Filter Reusable
on:
  workflow_call:
    inputs:
      install-command:
        description: "Command to install dependencies"
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: ${{ inputs.install-command }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Scan
        run: snyk test --json > opensource-results.json || true

      - name: Upload Snyk Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: opensource-results.json

      - name: Apply Filter
        run: |
          FILTERED=$(cat opensource-results.json | jq -c '
            [.vulnerabilities[] | select(
              (.severity == "high" or .severity == "critical") and
               (
  
                ((.exploit // .exploitMaturity) | ascii_downcase | gsub("-"; " ")) == "proof of concept"
                or
                ((.exploit // .exploitMaturity) | ascii_downcase | gsub("-"; " ")) == "mature"
              )

            )] 
          ')

          COUNT=$(echo "$FILTERED" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "No high/critical exploitable vulnerabilities found. Build passed."
            exit 0
          fi

          echo "Build failed - vulnerabilities meeting filter criteria:"
          echo "================================================================"
          echo ""

          echo "$FILTERED" | jq -r '.[] |
            "[\(.severity | ascii_upcase)] \(.identifiers.CVE[0] // .id) - \(.title)",
            "  Package : \(.packageName):\(.name) @ \(.version)",
            "  Exploit : \(.exploit)",
            "  Path    : \(.from | join(" > "))",
            ""
          '

          echo "================================================================"
          echo "Build-breaking vulns : $COUNT"
          echo "================================================================"
          echo ""
          echo "Error: Build failed - vulnerabilities meeting filter criteria:"
          exit 1
