version: 2

customFilters:
  filter: >
    .vulnerabilities |= map(
      if (
        (.severity == "high" or .severity == "critical")
        and
        (
          .exploit == "Proof of Concept"
          or
          .exploit == "Mature"
        )
      )
      then .
      else empty
      end
    )

pass: >
  [.vulnerabilities[]
    | select(
        (.severity == "high" or .severity == "critical")
        and
        (
          .exploit == "Proof of Concept"
          or
          .exploit == "Mature"
        )
      )
  ] | length

msg: "High/Critical vulnerability with Mature or PoC exploit detected"
